binary_sensor:
  - platform: gpio
    pin:
      number: 1
      mode: INPUT_PULLUP
      inverted: true
    id: media_button
    on_press:
      - if:
          condition:
            lambda: 'return id(media_menu_active);'
          then:
            - if:
                condition:
                  lambda: 'return !id(menu_button_wait_for_release);'
                then:
                  - lambda: |-
                      id(menu_button_hold_fired) = false;
                  - script.execute: menu_button_hold_watch
          else:
            - lambda: |-
                id(menu_button_hold_fired) = false;
            - script.execute: open_menu_hold_watch

    on_release:
      - script.stop: open_menu_hold_watch
      - if:
          condition:
            lambda: 'return id(media_menu_active);'
          then:
            - script.stop: menu_button_hold_watch
            - if:
                condition:
                  lambda: 'return id(menu_button_wait_for_release);'
                then:
                  - lambda: |-
                      id(menu_button_wait_for_release) = false;
                      id(menu_button_hold_fired) = false;
                else:
                  - if:
                      condition:
                        lambda: 'return !id(menu_button_hold_fired);'
                      then:
                        - script.execute: advance_media_menu
                  - lambda: |-
                      id(menu_button_hold_fired) = false;
          else:
            - if:
                condition:
                  lambda: 'return id(menu_button_wait_for_release);'
                then:
                  - lambda: |-
                      id(menu_button_wait_for_release) = false;
                      id(menu_button_hold_fired) = false;

    on_multi_click:
      - timing:
          - ON for at most 350ms
          - OFF for at least 351ms
        then:
          - if:
              condition:
                lambda: 'return !id(media_menu_active) && !id(menu_button_hold_fired);'
              then:
                - homeassistant.action:
                    action: media_player.media_play_pause
                    data:
                      entity_id: ${ha_media_player_entity}

      - timing:
          - ON for at most 350ms
          - OFF for at most 350ms
          - ON for at most 350ms
          - OFF for at least 351ms
        then:
          - if:
              condition:
                lambda: 'return !id(media_menu_active) && !id(menu_button_hold_fired);'
              then:
                - homeassistant.action:
                    action: media_player.media_next_track
                    data:
                      entity_id: ${ha_media_player_entity}

      - timing:
          - ON for at most 350ms
          - OFF for at most 350ms
          - ON for at most 350ms
          - OFF for at most 350ms
          - ON for at most 350ms
          - OFF for at least 351ms
        then:
          - if:
              condition:
                lambda: 'return !id(media_menu_active) && !id(menu_button_hold_fired);'
              then:
                - homeassistant.action:
                    action: media_player.media_previous_track
                    data:
                      entity_id: ${ha_media_player_entity}
