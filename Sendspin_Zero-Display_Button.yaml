esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.3.0
  name_add_mac_suffix: false
  on_boot:
    priority: -100
    then:
      - script.execute: update_status_leds
      - script.execute: update_weather_display
      - lvgl.page.show: idle_page

esp32:
  variant: esp32s3
  flash_size: 4MB
  framework:
    type: esp-idf

logger:
  level: WARN

api:
  on_client_connected:
    - script.execute: ${api_connected_script}

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    password: "RZ7D3EzJdPM6"

psram:
  mode: quad
  speed: 80MHz

captive_portal:

time:
  - platform: homeassistant
    id: homeassistant_time

globals:
  - id: sendspin_album_art_valid
    type: bool
    restore_value: no
    initial_value: "false"
  - id: media_menu_active
    type: bool
    restore_value: no
    initial_value: "false"
  - id: media_menu_index
    type: int
    restore_value: no
    initial_value: "0"
  - id: selected_media_name
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: selected_media_url
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: menu_button_hold_fired
    type: bool
    restore_value: no
    initial_value: "false"
  - id: menu_button_wait_for_release
    type: bool
    restore_value: no
    initial_value: "false"

image:
  - file: https://raw.githubusercontent.com/RealDeco/xiaozhi-esphome/main/images/Gwen/240x240/playing.png
    id: fallback_playing_image
    resize: 170x170
    type: RGB565
    dither: NONE

generic_image:
  - platform: sendspin
    id: sendspin_album_art
    format: jpg
    type: RGB565
    resize: 170x170
    image_source: ALBUM
    on_image_decoded:
      - script.stop: album_art_timeout_fallback
      - lambda: |-
          id(sendspin_album_art_valid) = true;
      - lvgl.image.update:
          id: album_art_widget
          src: sendspin_album_art
    on_image_error:
      - script.stop: album_art_timeout_fallback
      - lambda: |-
          id(sendspin_album_art_valid) = false;
      - lvgl.image.update:
          id: album_art_widget
          src: fallback_playing_image

sendspin:
  id: sendspin_hub
  task_stack_in_psram: false

media_player:
  - platform: sendspin
    id: sendspin_group_media_player
    name: Sendspin Group Media Player

    on_play:
      then:
        - script.stop: mp_idle_debounce
        - lvgl.page.show: sendspin_page
        - script.execute: update_status_leds

    on_announcement:
      then:
        - script.execute: update_status_leds

    on_idle:
      then:
        - script.execute: mp_idle_debounce
        - script.execute: update_status_leds

    on_pause:
      then:
        - script.execute: update_status_leds

    on_state:
      then:
        - script.execute: update_status_leds

sensor:
  - platform: homeassistant
    id: ha_weather_temperature
    entity_id: ${ha_weather_entity}
    attribute: temperature
    on_value:
      - script.execute: update_weather_display

  - platform: homeassistant
    id: ha_weather_wind_speed
    entity_id: ${ha_weather_entity}
    attribute: wind_speed
    on_value:
      - script.execute: update_weather_display

text_sensor:
  - platform: homeassistant
    id: ha_weather_condition
    entity_id: ${ha_weather_entity}
    on_value:
      - lambda: |-
          const char* icon = "\U000F0590";
          auto c = x;

          if (c == "sunny" || c == "clear") {
            icon = "\U000F0599";
          } else if (c == "clear-night") {
            icon = "\U000F0594";
          } else if (c == "partlycloudy") {
            icon = "\U000F0595";
          } else if (c == "cloudy") {
            icon = "\U000F0590";
          } else if (c == "fog") {
            icon = "\U000F0591";
          } else if (c == "rainy") {
            icon = "\U000F0597";
          } else if (c == "pouring") {
            icon = "\U000F0596";
          } else if (c == "snowy") {
            icon = "\U000F0598";
          } else if (c == "lightning") {
            icon = "\U000F0593";
          } else if (c == "hail") {
            icon = "\U000F0592";
          }

          lv_label_set_text(id(weather_icon_glow), icon);
          lv_label_set_text(id(weather_icon), icon);
      - script.execute: update_weather_display
      - script.execute: fetch_daily_forecast

  - platform: homeassistant
    id: ha_weather_temperature_unit
    entity_id: ${ha_weather_entity}
    attribute: temperature_unit
    on_value:
      - script.execute: update_weather_display

  - platform: homeassistant
    id: ha_weather_wind_speed_unit
    entity_id: ${ha_weather_entity}
    attribute: wind_speed_unit
    on_value:
      - script.execute: update_weather_display

  - platform: sendspin
    id: sendspin_title
    type: title
    on_value:
      - lambda: |-
          id(sendspin_album_art_valid) = false;
      - lvgl.image.update:
          id: album_art_widget
          src: fallback_playing_image
      - script.execute: album_art_timeout_fallback
      - lvgl.label.update:
          id: now_playing_title_label
          text: !lambda |-
            if (x.empty()) return std::string(" ");
            return x;

  - platform: sendspin
    id: sendspin_artist
    type: artist
    on_value:
      - lambda: |-
          id(sendspin_album_art_valid) = false;
      - lvgl.image.update:
          id: album_art_widget
          src: fallback_playing_image
      - script.execute: album_art_timeout_fallback
      - lvgl.label.update:
          id: now_playing_artist_label
          text: !lambda |-
            if (x.empty()) return std::string(" ");
            return x;

  - platform: sendspin
    id: sendspin_album
    type: album
    on_value:
      - lambda: |-
          id(sendspin_album_art_valid) = false;
      - lvgl.image.update:
          id: album_art_widget
          src: fallback_playing_image
      - script.execute: album_art_timeout_fallback
      - lvgl.label.update:
          id: now_playing_album_label
          text: !lambda |-
            if (x.empty()) return std::string(" ");
            return x;

  - platform: template
    id: clock_hms
    update_interval: 1s
    lambda: |-
      auto t = id(homeassistant_time).now();
      if (!t.is_valid()) return std::string("--:--:--");
      bool hide_colons = ((t.second % 2) == 0);
      char buf[9];
      if (hide_colons) snprintf(buf, sizeof(buf), "%02d %02d %02d", t.hour, t.minute, t.second);
      else snprintf(buf, sizeof(buf), "%02d:%02d:%02d", t.hour, t.minute, t.second);
      return std::string(buf);
    on_value:
      - if:
          condition:
            lvgl.page.is_showing: idle_page
          then:
            - lvgl.label.update:
                id: clock_label
                text: !lambda return x;

  - platform: template
    id: clock_date
    update_interval: 30s
    lambda: |-
      auto t = id(homeassistant_time).now();
      if (!t.is_valid()) return std::string("------");

      static const char* months[] = {
        "January","February","March","April","May","June",
        "July","August","September","October","November","December"
      };

      const char* mon = (t.month >= 1 && t.month <= 12) ? months[t.month - 1] : "???";
      char buf[32];
      snprintf(buf, sizeof(buf), "%d %s", t.day_of_month, mon);
      return std::string(buf);
    on_value:
      - if:
          condition:
            lvgl.page.is_showing: idle_page
          then:
            - lvgl.label.update:
                id: date_label
                text: !lambda return x;

