  media_url_1: "library://playlist/72"
  media_name_2: "Tommy Steele"
  media_url_2: "library://playlist/68"
  media_name_3: "Carpenters"
  media_url_3: "library://playlist/76"
  media_name_4: "Random Mix"
  media_url_4: "library://playlist/77"
  media_name_5: "Radio: P5"
  media_url_5: "https://drliveradio1.akamaized.net/hls/live/2097651/p5fyn/masterab.m3u8"
