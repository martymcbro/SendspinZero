binary_sensor:
  - platform: gpio
    pin:
      number: 43
      mode: INPUT_PULLUP
      inverted: true
    id: rotary_button
    filters:
      - delayed_on_off: 20ms
    on_press:
      - script.execute: toggle_knob_popup

  - platform: gpio
    pin:
      number: 44
      mode: INPUT_PULLUP
      inverted: true
    id: media_button
    filters:
      - delayed_on_off: 20ms
    on_multi_click:
      - timing:
          - ON for at most 350ms
          - OFF for at least 351ms
        then:
          - if:
              condition:
                media_player.is_playing: sendspin_group_media_player
              then:
                - media_player.next: sendspin_group_media_player
              else:
                - media_player.play: sendspin_group_media_player

      - timing:
          - ON for at most 350ms
          - OFF for at most 350ms
          - ON for at most 350ms
          - OFF for at least 351ms
        then:
          - media_player.previous: sendspin_group_media_player

      - timing:
          - ON for at least 700ms
        then:
          - media_player.pause: sendspin_group_media_player
