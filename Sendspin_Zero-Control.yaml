          if (count > 10) count = 10;
          if (id(media_menu_cursor) < 1 || id(media_menu_cursor) > count) {
            id(media_menu_cursor) = 1;
          }
          const char *labels[10] = {
            "${media_name_1}", "${media_name_2}", "${media_name_3}", "${media_name_4}", "${media_name_5}",
            "${media_name_6}", "${media_name_7}", "${media_name_8}", "${media_name_9}", "${media_name_10}"
