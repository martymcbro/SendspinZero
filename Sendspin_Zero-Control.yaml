substitutions:
  name: esphome-web-e83240
  friendly_name: Sendspin Zero Control

## SETTINGS ######################################################################################################################################

  # Startup sound, options are: Home_Connected or Home_Connected_Male
  startup_sound_file: Home_Connected

  # your home assistant weather entity, in most cases the same.
  ha_weather_entity: weather.forecast_home

  # Light entity or group to be controlled by the rotary knob
  # for this to work You also need to enable “Allow the device to perform Home Assistant actions” for this ESPHome device in Home Assistant.
  control_device_1: light.ceiling
  control_devicename_1: "Ceiling 1"
  control_device_2: light.ceiling_2
  control_devicename_2: "Ceiling 2"
  control_device_3: light.desklight_light
  control_devicename_3: "Desk Light"
  control_device_4: light.hue_p45_7_light
  control_devicename_4: "Prt. Light"
  control_device_5: light.hue_p45_8_light
  control_devicename_5: "Blue Lamp"
  control_device_6: light.livingroom_all_lights
  control_devicename_6: "All Light"

  # Home Assistant button entity triggered by normal-button triple click.
  favorite_button_entity: button.sensspin_zero_control_favorite_current_song

  # Home Assistant Media Player entity for playing streams (e.g. via Music Assistant)
  ha_media_player_entity: media_player.sensspin_zero_control

  # Media Menu Items Configuration
  media_item_count: "6" # Increase this when adding more items below (max 10)

  # Media links and names for menu
  media_name_1: "Random 500"
  media_url_1: "library://playlist/45"
  media_name_2: "Neil Diamond"
  media_url_2: "library://playlist/72"
  media_name_3: "Tommy Steele"
  media_url_3: "library://playlist/68"
  media_name_4: "Radio: P5"
  media_url_4: "http://live-icy.gss.dr.dk:8000/A/A25L.mp3"
  media_name_5: "Radio: Boost"
  media_url_5: "http://6434.cloudrad.io:8066/live"
  media_name_6: "Radio: Smooth Chill"
  media_url_6: "https://ice-sov.musicradio.com/SmoothChillMP3"

  # Available slots for future expansion (up to 10)
  media_name_7: "Unused 7"
  media_url_7: "unused"
  media_name_8: "Unused 8"
  media_url_8: "unused"
  media_name_9: "Unused 9"
  media_url_9: "unused"
  media_name_10: "Unused 10"
  media_url_10: "unused"


## ROTATIO: THIS PART IS ONLY NEEDED IF YOU TURNED DISPLAY AROUND IN CASE ########################################################################

  # 0 degree (default)
  display_swap_xy: "false"
  display_mirror_x: "false"
  display_mirror_y: "false"
  display_offset_width: "0"
  display_offset_height: "0"

  # 180 degree
  # display_swap_xy: "false"
  # display_mirror_x: "true"
  # display_mirror_y: "true"
  # display_offset_width: "0"
  # display_offset_height: "80"

## END OF SETTINGS ###############################################################################################################################

packages:
  hw: #ANALOG
    url: https://github.com/RealDeco/SendspinZero.git
    ref: main
    refresh: 0s
    files:
      - analog_speaker_config.yaml

#  hw: #DIGITAL
#    url: https://github.com/RealDeco/SendspinZero.git
#    ref: main
#    refresh: 0s
#    files:
#      - digital_speaker_config.yaml

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.3.0
  name_add_mac_suffix: false
  on_boot:
    priority: -100
    then:
      - script.execute: led_red
      - lvgl.page.show: idle_page

esp32:
  variant: esp32s3
  flash_size: 4MB
  framework:
    type: esp-idf

logger:
  level: WARN
  baud_rate: 0

api:
  on_client_connected:
    - lambda: |-
        if (!id(boot_sound_played)) {
          id(boot_sound_played) = true;
          if (id(startup_sound_switch).state) {
            id(play_sound)->execute(true, std::string("ready_sound"));
          }
        }
    - delay: 5s
    - script.execute: fetch_daily_forecast

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    password: "RZ7D3EzJdPM6"

psram:
  mode: quad
  speed: 80MHz

captive_portal:

time:
  - platform: homeassistant
    id: homeassistant_time

external_components:
  - source:
      # https://github.com/esphome/esphome/pull/14933
      type: git
      url: https://github.com/kahrendt/esphome
      ref: 890e33f99af2c2ea15dc74c3ec4cf32d25203526
    components: [const, media_source, sendspin, generic_image]
  - source:
      # https://github.com/esphome/esphome/pull/12429
      type: git
      url: https://github.com/esphome/esphome
      ref: ff8ce89556748509d7ee8724e12d9d43d3c8c1e8
    refresh: 0s
    components: [http_request]

globals:
  - id: sendspin_album_art_valid
    type: bool
    restore_value: no
    initial_value: "false"

  - id: boot_sound_played
    type: bool
    restore_value: no
    initial_value: "false"

  - id: knob_popup_active
    type: bool
    restore_value: no
    initial_value: "false"

  - id: knob_control_pct
    type: int
    restore_value: no
    initial_value: "0"

  - id: volume_control_pct
    type: int
    restore_value: no
    initial_value: "0"

  - id: popup_mode_light
    type: bool
    restore_value: no
    initial_value: "false"


  - id: control_menu_active
    type: bool
    restore_value: no
    initial_value: "false"

  - id: selected_control_index
    type: int
    restore_value: yes
    initial_value: "1"

  - id: control_menu_cursor
    type: int
    restore_value: no
    initial_value: "1"

  - id: control_menu_turn_halfstep
    type: bool
    restore_value: no
    initial_value: "false"

  - id: media_menu_active
    type: bool
    restore_value: no
    initial_value: "false"

  - id: media_menu_cursor
    type: int
    restore_value: no
    initial_value: "1"

  - id: media_menu_turn_halfstep
    type: bool
    restore_value: no
    initial_value: "false"

  - id: media_button_click_count
    type: int
    restore_value: no
    initial_value: "0"

  - id: media_button_hold_fired
    type: bool
    restore_value: no
    initial_value: "false"

image:
  - file: https://raw.githubusercontent.com/RealDeco/xiaozhi-esphome/main/images/Gwen/240x240/playing.png
    id: fallback_playing_image
    resize: 216x216
    type: RGB565
    dither: NONE

generic_image:
  - platform: sendspin
    id: sendspin_album_art
    format: jpg
    type: RGB565
    resize: 216x216
    image_source: ALBUM
    on_image_decoded:
      - script.stop: album_art_timeout_fallback
      - lambda: |-
          id(sendspin_album_art_valid) = true;
      - lvgl.image.update:
          id: album_art_widget
          src: sendspin_album_art
    on_image_error:
      - script.stop: album_art_timeout_fallback
      - lambda: |-
          id(sendspin_album_art_valid) = false;
      - lvgl.image.update:
          id: album_art_widget
          src: fallback_playing_image

sendspin:
  id: sendspin_hub
  task_stack_in_psram: false

http_request:
  buffer_size_rx: 2048  # Reduces CPU load when streaming audio

audio_file:
  - id: ready_sound
    file: https://github.com/RealDeco/xiaozhi-esphome/raw/main/sounds/${startup_sound_file}.flac

media_source:
  - platform: audio_file
    id: audio_file_announcement_source
  - platform: http_request
    id: http_announcement_source
    buffer_size: 250000
  - platform: http_request
    id: http_media_source
    buffer_size: 500000
  - platform: sendspin
    id: sendspin_media_source

media_player:
  - platform: sendspin
    id: sendspin_group_media_player
    name: Sendspin Group Media Player

  - platform: speaker_source
    id: external_media_player
    name: Media Player

    announcement_pipeline:
      format: FLAC
      num_channels: 1
      sample_rate: ${media_sample_rate}
      speaker: announcement_resampling_speaker
      sources:
        - audio_file_announcement_source
        - http_announcement_source

    media_pipeline:
      format: FLAC
      num_channels: 2
      sample_rate: ${media_sample_rate}
      speaker: media_resampling_speaker
      sources:
        - http_media_source
        - sendspin_media_source
    volume_increment: 0.05
    volume_min: 0
    volume_max: 0.90

    on_play:
      then:
        - script.stop: mp_idle_debounce
        - script.execute: hide_media_menu
        - lvgl.page.show: sendspin_page
        - if:
            condition:
              lambda: 'return id(control_menu_active);'
            then:
              - script.execute: render_control_menu
            else:
              - if:
                  condition:
                    lambda: 'return (!lv_obj_has_flag(id(popup_idle), LV_OBJ_FLAG_HIDDEN)) || (!lv_obj_has_flag(id(popup_sendspin), LV_OBJ_FLAG_HIDDEN));'
                  then:
                    - script.execute: render_popup
        - script.execute: led_green

    on_announcement:
      then:
        - script.execute: led_green

    on_idle:
      then:
        - script.execute: mp_idle_debounce
        - script.execute: led_red

    on_pause:
      then:
        - script.execute: led_red

sensor:
  - platform: rotary_encoder
    id: rotary_encoder_sensor
    internal: true
    pin_a:
      number: GPIO12
      mode:
        input: true
        pullup: true
    pin_b:
      number: GPIO13
      mode:
        input: true
        pullup: true
    resolution: 2
    restore_mode: ALWAYS_ZERO
    on_clockwise:
      - script.execute: rotary_cw
    on_anticlockwise:
      - script.execute: rotary_ccw

  - platform: homeassistant
    id: ha_weather_temperature
    entity_id: ${ha_weather_entity}
    attribute: temperature

  - platform: homeassistant
    id: ha_weather_wind_speed
    entity_id: ${ha_weather_entity}
    attribute: wind_speed


text_sensor:
  - platform: homeassistant
    id: ha_weather_condition
    entity_id: ${ha_weather_entity}
    on_value:
      - lambda: |-
          const char* icon = "\U000F0590";
          auto c = x;

          if (c == "sunny" || c == "clear") {
            icon = "\U000F0599";
          } else if (c == "clear-night") {
            icon = "\U000F0594";
          } else if (c == "partlycloudy") {
            icon = "\U000F0595";
          } else if (c == "cloudy") {
            icon = "\U000F0590";
          } else if (c == "fog") {
            icon = "\U000F0591";
          } else if (c == "rainy") {
            icon = "\U000F0597";
          } else if (c == "pouring") {
            icon = "\U000F0596";
          } else if (c == "snowy") {
            icon = "\U000F0598";
          } else if (c == "lightning") {
            icon = "\U000F0593";
          } else if (c == "hail") {
            icon = "\U000F0592";
          }

          lv_label_set_text(id(weather_icon_glow), icon);
          lv_label_set_text(id(weather_icon), icon);
      - script.execute: fetch_daily_forecast

  - platform: homeassistant
    id: ha_weather_temperature_unit
    entity_id: ${ha_weather_entity}
    attribute: temperature_unit

  - platform: homeassistant
    id: ha_weather_wind_speed_unit
    entity_id: ${ha_weather_entity}
    attribute: wind_speed_unit

  - platform: homeassistant
    id: control_device_1_brightness_text
    entity_id: ${control_device_1}
    attribute: brightness
    internal: true

  - platform: homeassistant
    id: control_device_2_brightness_text
    entity_id: ${control_device_2}
    attribute: brightness
    internal: true

  - platform: homeassistant
    id: control_device_3_brightness_text
    entity_id: ${control_device_3}
    attribute: brightness
    internal: true

  - platform: homeassistant
    id: control_device_4_brightness_text
    entity_id: ${control_device_4}
    attribute: brightness
    internal: true

  - platform: homeassistant
    id: control_device_5_brightness_text
    entity_id: ${control_device_5}
    attribute: brightness
    internal: true

  - platform: homeassistant
    id: control_device_6_brightness_text
    entity_id: ${control_device_6}
    attribute: brightness
    internal: true

  - platform: sendspin
    id: sendspin_title
    type: title
    on_value:
      - lambda: |-
          id(sendspin_album_art_valid) = false;
      - lvgl.image.update:
          id: album_art_widget
          src: fallback_playing_image
      - script.execute: album_art_timeout_fallback
      - lvgl.label.update:
          id: now_playing_title_label
          text: !lambda |-
            if (x.empty()) return " ";
            return x;

  - platform: sendspin
    id: sendspin_artist
    type: artist
    on_value:
      - lambda: |-
          id(sendspin_album_art_valid) = false;
      - lvgl.image.update:
          id: album_art_widget
          src: fallback_playing_image
      - script.execute: album_art_timeout_fallback
      - lvgl.label.update:
          id: now_playing_artist_label
          text: !lambda |-
            if (x.empty()) return " ";
            return x;

  - platform: sendspin
    id: album_title
    type: album
    on_value:
      - lambda: |-
          id(sendspin_album_art_valid) = false;
      - lvgl.image.update:
          id: album_art_widget
          src: fallback_playing_image
      - script.execute: album_art_timeout_fallback
      - lvgl.label.update:
          id: now_playing_album_label
          text: !lambda |-
            if (x.empty()) return " ";
            return x;

  - platform: template
    id: clock_hms
    update_interval: 1s
    lambda: |-
      auto t = id(homeassistant_time).now();
      if (!t.is_valid()) return std::string("--:--:--");
      bool hide_colons = ((t.second % 2) == 0);
      char buf[9];
      if (hide_colons) snprintf(buf, sizeof(buf), "%02d %02d %02d", t.hour, t.minute, t.second);
      else snprintf(buf, sizeof(buf), "%02d:%02d:%02d", t.hour, t.minute, t.second);
      return std::string(buf);
    on_value:
      - if:
          condition:
            lvgl.page.is_showing: idle_page
          then:
            - lvgl.label.update:
                id: clock_label
                text: !lambda return x;

  - platform: template
    id: clock_date
    update_interval: 30s
    lambda: |-
      auto t = id(homeassistant_time).now();
      if (!t.is_valid()) return std::string("------");

      static const char* months[] = {
        "January","February","March","April","May","June",
        "July","August","September","October","November","December"
      };

      const char* mon = (t.month >= 1 && t.month <= 12) ? months[t.month - 1] : "???";
      char buf[32];
      snprintf(buf, sizeof(buf), "%d %s", t.day_of_month, mon);
      return std::string(buf);
    on_value:
      - if:
          condition:
            lvgl.page.is_showing: idle_page
          then:
            - lvgl.label.update:
                id: date_label
                text: !lambda return x;

  - platform: template
    id: weather_temp_big
    update_interval: 15s
    lambda: |-
      if (!id(ha_weather_temperature).has_state()) return std::string("--");

      std::string tunit = id(ha_weather_temperature_unit).state.c_str();
      if (tunit.empty()) tunit = "°C";
      lv_label_set_text(id(weather_big_temp_unit), tunit.c_str());

      int ti = (int) lroundf(id(ha_weather_temperature).state);
      char buf[8];
      snprintf(buf, sizeof(buf), "%d", ti);
      return std::string(buf);
    on_value:
      - if:
          condition:
            lvgl.page.is_showing: idle_page
          then:
            - lvgl.label.update:
                id: weather_big_temp
                text: !lambda return x;

  - platform: template
    id: weather_line
    update_interval: 15s
    lambda: |-
      if (!id(ha_weather_temperature).has_state() || !id(ha_weather_wind_speed).has_state()) {
        return std::string("Weather unavailable");
      }

      std::string tunit = id(ha_weather_temperature_unit).state.c_str();
      if (tunit.empty()) tunit = "°C";

      std::string wunit = id(ha_weather_wind_speed_unit).state.c_str();
      if (wunit.empty()) wunit = "m/s";

      float temp_display = id(ha_weather_temperature).state;
      float wind_display = id(ha_weather_wind_speed).state;

      float temp_c = temp_display;
      if (tunit == "°F" || tunit == "F") {
        temp_c = (temp_display - 32.0f) * 5.0f / 9.0f;
      }

      float wind_ms = wind_display;
      if (wunit == "km/h" || wunit == "kmh") {
        wind_ms = wind_display / 3.6f;
      } else if (wunit == "mph") {
        wind_ms = wind_display * 0.44704f;
      } else if (wunit == "kn" || wunit == "kt" || wunit == "kts" || wunit == "knots") {
        wind_ms = wind_display * 0.514444f;
      }

      float feels_c = temp_c;
      if (temp_c <= 10.0f && wind_ms > 1.3f) {
        float wind_kmh = wind_ms * 3.6f;
        float v16 = powf(wind_kmh, 0.16f);
        feels_c = 13.12f + 0.6215f * temp_c - 11.37f * v16 + 0.3965f * temp_c * v16;
      }

      float feels_display = feels_c;
      if (tunit == "°F" || tunit == "F") {
        feels_display = feels_c * 9.0f / 5.0f + 32.0f;
      }

      char buf[160];
      snprintf(buf, sizeof(buf),
               "Temp: %.1f%s  -  Feels like: %.1f%s  -  Wind speed: %.1f %s",
               temp_display, tunit.c_str(),
               feels_display, tunit.c_str(),
               wind_display, wunit.c_str());
      return std::string(buf);
    on_value:
      - if:
          condition:
            and:
              - lvgl.page.is_showing: idle_page
              - lambda: return x != "Weather unavailable";
          then:
            - lvgl.widget.show: weather_header
            - lvgl.widget.show: weather_label
            - lvgl.widget.show: weather_label_glow
            - lvgl.label.update:
                id: weather_label_glow
                text: !lambda return x;
            - lvgl.label.update:
                id: weather_label
                text: !lambda return x;
          else:
            - if:
                condition:
                  lvgl.page.is_showing: idle_page
                then:
                  - lvgl.widget.hide: weather_header
                  - lvgl.widget.hide: weather_label
                  - lvgl.widget.hide: weather_label_glow

