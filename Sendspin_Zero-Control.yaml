    model: ST7789V
    data_rate: 40MHz
    spi_mode: MODE3
    dc_pin: 10
    reset_pin: 9
    dimensions:
      width: 240
      height: 320
      offset_width: ${display_offset_width}
      offset_height: ${display_offset_height}
    transform:
      swap_xy: ${display_swap_xy}
      mirror_x: ${display_mirror_x}
      mirror_y: ${display_mirror_y}
    invert_colors: true
    auto_clear_enabled: false
    update_interval: never

