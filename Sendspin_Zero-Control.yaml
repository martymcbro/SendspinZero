          if (id(selected_control_index) == 2) {
            bri_s = id(control_device_2_brightness_text).state;
          } else if (id(selected_control_index) == 3) {
            bri_s = id(control_device_3_brightness_text).state;
          } else if (id(selected_control_index) == 4) {
