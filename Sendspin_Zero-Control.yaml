            bri_s = id(control_device_6_brightness_text).state;
          } else {
            bri_s = id(control_device_1_brightness_text).state;
          }
          if (!bri_s.empty() && bri_s != "None" && bri_s != "unknown" && bri_s != "unavailable") {
            int bri = atoi(bri_s.c_str());
            if (bri < 0) bri = 0;
