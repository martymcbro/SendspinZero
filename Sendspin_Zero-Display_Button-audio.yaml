substitutions:
  startup_sound_file: Home_Connected
  display_state_player: external_media_player
  api_connected_script: api_connected_actions_audio

packages:
  hw:
    url: https://github.com/RealDeco/SendspinZero.git
    ref: main
    refresh: 0s
    files:
      - analog_speaker_config.yaml

external_components:
  - source:
      type: git
      url: https://github.com/kahrendt/esphome
      ref: 890e33f99af2c2ea15dc74c3ec4cf32d25203526
    components: [media_source]
  - source:
      type: git
      url: https://github.com/esphome/esphome
      ref: ff8ce89556748509d7ee8724e12d9d43d3c8c1e8
    refresh: 0s
    components: [http_request]

globals:
  - id: boot_sound_played
    type: bool
    restore_value: no
    initial_value: "false"

http_request:
  buffer_size_rx: 2048

audio_file:
  - id: ready_sound
    file: https://github.com/RealDeco/xiaozhi-esphome/raw/main/sounds/${startup_sound_file}.flac

media_source:
  - platform: audio_file
    id: audio_file_announcement_source
  - platform: http_request
    id: http_announcement_source
    buffer_size: 250000
  - platform: http_request
    id: http_media_source
    buffer_size: 500000
  - platform: sendspin
    id: sendspin_media_source

media_player:
  - platform: speaker_source
    id: external_media_player
    name: Media Player

    announcement_pipeline:
      format: FLAC
      num_channels: 1
      sample_rate: ${media_sample_rate}
      speaker: announcement_resampling_speaker
      sources:
        - audio_file_announcement_source
        - http_announcement_source

    media_pipeline:
      format: FLAC
      num_channels: 2
      sample_rate: ${media_sample_rate}
      speaker: media_resampling_speaker
      sources:
        - http_media_source
        - sendspin_media_source

    volume_increment: 0.05
    volume_min: 0.4
    volume_max: 0.85

    on_play:
      then:
        - script.stop: mp_idle_debounce
        - lvgl.page.show: sendspin_page
        - script.execute: update_status_leds

    on_announcement:
      then:
        - script.execute: update_status_leds

    on_idle:
      then:
        - script.execute: mp_idle_debounce
        - script.execute: update_status_leds

    on_pause:
      then:
        - script.execute: update_status_leds

    on_state:
      then:
        - script.execute: update_status_leds

script:
  - id: api_connected_actions_audio
    then:
      - lambda: |-
          if (!id(boot_sound_played)) {
            id(boot_sound_played) = true;
            if (id(startup_sound_switch).state) {
              id(play_sound)->execute(true, std::string("ready_sound"));
            }
          }
      - delay: 5s
      - script.execute: update_weather_display
      - script.execute: fetch_daily_forecast

  - id: play_sound
    parameters:
      priority: bool
      sound_file: string
    then:
      - if:
          condition:
            lambda: 'return sound_file == "ready_sound";'
          then:
            - delay: 2s
            - lvgl.page.show: boot_sound_page

      - if:
          condition:
            lambda: return priority;
          then:
            - media_player.stop:
                id: external_media_player
                announcement: true

      - lambda: |-
          if ((id(external_media_player).state != media_player::MediaPlayerState::MEDIA_PLAYER_STATE_ANNOUNCING) || priority) {
            id(external_media_player)
              ->make_call()
              .set_media_url("audio-file://" + sound_file)
              .set_announcement(true)
              .perform();
          }

switch:
  - platform: template
    id: startup_sound_switch
    name: Startup sound
    icon: "mdi:card-text-outline"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
